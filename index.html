  {code:'2351',ex:'tse',name:'順達',ind:'被動元件',sig:'買進',sc:4,note:'電池模組受惠電動車，NB電池業務回溫，布局良機'},
  {code:'2360',ex:'tse',name:'致茂',ind:'被動元件',sig:'持有',sc:3,note:'測試設備進入AI晶片領域，中長線布局題材'},
  {code:'2474',ex:'tse',name:'可成',ind:'被動元件',sig:'觀察',sc:3,note:'鋁合金機殼需求回升，技術面待突破均線壓力'},
  {code:'1590',ex:'tse',name:'亞德客-KY',ind:'被動元件',sig:'買進',sc:4,note:'工控自動化設備需求回升，毛利率優於同業'},
  {code:'6605',ex:'otc',name:'帝寶',ind:'被動元件',sig:'買進',sc:4,note:'汽車燈具台灣龍頭，電動車新光源訂單增加'},
  {code:'2330',ex:'tse',name:'台積電',ind:'半導體',sig:'持有',sc:3,note:'晶圓代工龍頭，CoWoS滿載，股價高，波段操作謹慎'},
  {code:'2454',ex:'tse',name:'聯發科',ind:'半導體',sig:'持有',sc:3,note:'AI手機AP受惠，天璣系列出貨強勁，注意估值'},
  {code:'3006',ex:'tse',name:'晶豪科',ind:'半導體',sig:'買進',sc:4,note:'DRAM利基型市場需求回升，股價低廉具彈性'},
  {code:'3264',ex:'otc',name:'欣銓',ind:'半導體',sig:'買進',sc:4,note:'IC測試後段製程需求增，小型封測廠受惠'},
  {code:'6533',ex:'otc',name:'晶宏半導體',ind:'矽光子/CPO',sig:'買進',sc:4,note:'光通訊IC受惠800G市場起飛，中長線看好'},

let PD={},filtered=[...STOCKS],curInd='',curPage=1,sortMode='',detChart=null;
const PAGE=15;

const cc=c=>c>0?'up':c<0?'dn':'fl';
const fv=v=>!v||isNaN(v)?'—':v>=10000?(v/10000).toFixed(1)+'萬':Math.round(v).toLocaleString();
const IBC={'低軌衛星':'sat','矽光子/CPO':'cpo','PCB':'pcb','半導體':'semi','AI伺服器':'ai','被動元件':'pass'};
const ib=i=>`<span class="ib ib-${IBC[i]||'pass'}">${i}</span>`;
const SBC={'強烈買進':'sb','買進':'b','觀察':'w','持有':'h'};
const sb=s=>`<span class="sb sb-${SBC[s]||'h'}">${s}</span>`;
const stars=n=>`<span class="stars">${'<span class="son">★</span>'.repeat(n)}${'<span class="sof">☆</span>'.repeat(5-n)}</span>`;

const setSt=(type,msg)=>{
  const b=document.getElementById('stBadge');
  b.className='st st-'+type; b.textContent=msg;
  const d=document.getElementById('brandDot');
  const cols={ok:'#22c97a',err:'#f87171',ld:'#f59e0b',idle:'#3f567a'};
  d.style.background=cols[type]||'#3f567a';
  d.style.animation=type==='ok'?'pulse 2s infinite':'none';
};
const setProg=p=>document.getElementById('prog').style.width=Math.min(100,p)+'%';

setInterval(()=>{
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleDateString('zh-TW')+' '+n.toLocaleTimeString('zh-TW');
},1000);

async function loadAll(){
  document.getElementById('rfBtn').disabled=true;
  setSt('ld','取得上市收盤價...');
  setProg(5);
  let loaded=0;

  // 透過自己的 Vercel proxy（同網域，無 CORS 問題）
  try{
    const r=await fetch('/api/stock?type=tse');
    if(!r.ok) throw new Error('proxy HTTP '+r.status);
    const rows=await r.json();
    if(rows.error) throw new Error(rows.error);
    const map={}; rows.forEach(row=>map[row.Code]=row);
    STOCKS.filter(s=>s.ex==='tse').forEach(s=>{
      const row=map[s.code]; if(!row) return;
      const close=parseFloat(row.ClosingPrice)||0;
      const chg=parseFloat(row.Change)||0;
      const prev=close-chg;
      PD[s.code]={close,chg,chgPct:prev?chg/prev*100:0,
        vol:parseInt((row.TradeVolume||'0').replace(/,/g,''))/1000,
        open:parseFloat(row.OpeningPrice)||0,
        high:parseFloat(row.HighestPrice)||0,
        low:parseFloat(row.LowestPrice)||0,
        date:row.Date?row.Date.replace(/^(\d{3})(\d{2})(\d{2})$/,(_,y,m,d)=>`${+y+1911}/${m}/${d}`):'',
        src:'TWSE'};
      loaded++;
    });
    setProg(55);
  }catch(e){
    setSt('err','載入失敗：'+e.message);
    document.getElementById('rfBtn').disabled=false;
    return;
  }

  setSt('ld','取得上櫃收盤價...');
  try{
    const r=await fetch('/api/stock?type=otc');
    if(r.ok){
      const rows=await r.json();
      if(!rows.error){
        const map={}; rows.forEach(row=>map[row.SecuritiesCompanyCode]=row);
        STOCKS.filter(s=>s.ex==='otc').forEach(s=>{
          const row=map[s.code]; if(!row) return;
          const close=parseFloat(row.Close)||0;
          const chg=parseFloat(row.Change)||0;
          const prev=close-chg;
          PD[s.code]={close,chg,chgPct:prev?chg/prev*100:0,
            vol:parseInt((row.TradeVolume||'0').replace(/,/g,''))/1000,
            open:parseFloat(row.Open)||0,
            high:parseFloat(row.High)||0,
            low:parseFloat(row.Low)||0,
            date:row.Date||'',src:'TPEx'};
          loaded++;
        });
      }
    }
  }catch(e){console.warn('OTC:',e.message)}

  setProg(100);
  const date=Object.values(PD).find(p=>p.date)?.date||'';
  document.getElementById('s-ld').textContent=loaded+'/'+STOCKS.length;
  document.getElementById('s-date').textContent=date;
  setSt(loaded>0?'ok':'err',loaded>0?`已載入 ${loaded} 檔 · ${date}`:'無法取得股價');
  document.getElementById('rfBtn').disabled=false;
  applyFilt(); updateSum();
}

function buildTabs(){
  const inds=['全部',...new Set(STOCKS.map(s=>s.ind))];
  document.getElementById('indTabs').innerHTML=inds.map(i=>
    `<button class="tab ${i==='全部'?'on':''}" onclick="setInd(this,'${i==='全部'?'':i}')">${i}</button>`
  ).join('');
}
function setInd(el,ind){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on'); curInd=ind; curPage=1; applyFilt();
}
function srt(f){
  const m={p:'p-d',chg:'chg-d'};
  document.getElementById('sortSel').value=m[f]||'';
  sortMode=m[f]||''; curPage=1; applyFilt();
}
document.getElementById('srch').addEventListener('input',()=>{curPage=1;applyFilt()});
document.getElementById('sigSel').addEventListener('change',()=>{curPage=1;applyFilt()});
document.getElementById('sortSel').addEventListener('change',e=>{sortMode=e.target.value;curPage=1;applyFilt()});

function applyFilt(){
  const q=document.getElementById('srch').value.toLowerCase();
  const sig=document.getElementById('sigSel').value;
  filtered=STOCKS.filter(s=>(!curInd||s.ind===curInd)&&(!q||s.code.includes(q)||s.name.toLowerCase().includes(q))&&(!sig||s.sig===sig));
  if(sortMode) filtered.sort((a,b)=>{
    const pa=PD[a.code],pb=PD[b.code];
    if(sortMode==='chg-d') return (pb?.chgPct||0)-(pa?.chgPct||0);
    if(sortMode==='chg-a') return (pa?.chgPct||0)-(pb?.chgPct||0);
    if(sortMode==='p-d') return (pb?.close||0)-(pa?.close||0);
    if(sortMode==='p-a') return (pa?.close||0)-(pb?.close||0);
    if(sortMode==='sc-d') return b.sc-a.sc;
    return 0;
  });
  renderTbl(); updateSum();
}

function renderTbl(){
  const s0=(curPage-1)*PAGE,page=filtered.slice(s0,s0+PAGE);
  document.getElementById('tbl').innerHTML=page.map(s=>{
    const p=PD[s.code];
    const pCell=p?`<span class="prc ${cc(p.chg)}">${p.close.toFixed(2)}</span>`:`<span class="pld">—</span>`;
    const cCell=p?`<span class="mono ${cc(p.chg)}" style="font-size:12px">${p.chg>=0?'+':''}${p.chgPct.toFixed(2)}%</span>`:'—';
    const dCell=p?`<span class="mono ${cc(p.chg)}" style="font-size:11px">${p.chg>=0?'+':''}${p.chg.toFixed(2)}</span>`:'—';
    const vol=p?.vol||0;
    const vCell=p?`<div class="vbar"><div class="vbg"><div class="vfg" style="width:${Math.min(100,vol/400)}%;background:${vol>10000?'#e84040':vol>3000?'#f59e0b':'#3d8cf0'}"></div></div><span class="mono" style="font-size:10px;color:#7d96bf">${fv(vol)}K</span></div>`:'—';
    const dtCell=p?`<span style="font-size:10px;color:#3f567a">${p.date}</span>`:'—';
    return `<tr class="drow" onclick="openDet('${s.code}')"><td class="code">${s.code}</td><td style="font-weight:500">${s.name}</td><td>${ib(s.ind)}</td><td>${pCell}</td><td>${cCell}</td><td>${dCell}</td><td>${vCell}</td><td>${sb(s.sig)}</td><td>${stars(s.sc)}</td><td>${dtCell}</td></tr>`;
  }).join('');
  renderPg();
}
function renderPg(){
  const tot=Math.ceil(filtered.length/PAGE);
  if(tot<=1){document.getElementById('pages').innerHTML='';return}
  let h=`<button class="pgb" ${curPage===1?'disabled':''} onclick="goP(${curPage-1})">‹</button>`;
  for(let i=1;i<=tot;i++){
    if(i===1||i===tot||Math.abs(i-curPage)<=1) h+=`<button class="pgb ${i===curPage?'on':''}" onclick="goP(${i})">${i}</button>`;
    else if(Math.abs(i-curPage)===2) h+=`<span class="pgi">…</span>`;
  }
  h+=`<button class="pgb" ${curPage===tot?'disabled':''} onclick="goP(${curPage+1})">›</button>`;
  h+=`<span class="pgi">${filtered.length}檔</span>`;
  document.getElementById('pages').innerHTML=h;
}
function goP(p){curPage=p;renderTbl();scrollTo(0,0)}
function updateSum(){
  const ps=STOCKS.map(s=>PD[s.code]).filter(Boolean);
  document.getElementById('s-up').textContent=ps.filter(p=>p.chg>0).length;
  document.getElementById('s-dn').textContent=ps.filter(p=>p.chg<0).length;
  document.getElementById('s-buy').textContent=STOCKS.filter(s=>s.sig==='強烈買進'||s.sig==='買進').length;
  document.getElementById('s-ld').textContent=Object.keys(PD).length+'/'+STOCKS.length;
}

async function openDet(code){
  const s=STOCKS.find(x=>x.code===code); if(!s) return;
  const p=PD[code];
  document.getElementById('det-code').textContent=s.code;
  document.getElementById('det-nm').textContent=s.name;
  document.getElementById('det-ib').innerHTML=ib(s.ind);
  document.getElementById('det-p').textContent=p?p.close.toFixed(2):'—';
  document.getElementById('det-p').className='det-p '+(p?cc(p.chg):'');
  document.getElementById('det-c').textContent=p?(p.chg>=0?'+':'')+p.chgPct.toFixed(2)+'%':'—';
  document.getElementById('det-c').className='det-c '+(p?cc(p.chg):'');
  document.getElementById('det-meta').textContent=p?`(${p.src} · ${p.date})`:'';
  document.getElementById('det-mg').innerHTML=[
    {l:'開盤',v:p?p.open.toFixed(2):'—'},{l:'最高',v:p?p.high.toFixed(2):'—',c:'up'},
    {l:'最低',v:p?p.low.toFixed(2):'—',c:'dn'},{l:'成交量',v:p?fv(p.vol)+'千股':'—'},
    {l:'漲跌額',v:p?(p.chg>=0?'+':'')+p.chg.toFixed(2):'—',c:p?cc(p.chg):''},
    {l:'AI訊號',v:sb(s.sig)},{l:'評分',v:stars(s.sc)},
  ].map(m=>`<div class="det-mc"><div class="det-ml">${m.l}</div><div class="det-mv ${m.c||''}">${m.v}</div></div>`).join('');
  document.getElementById('det-note').textContent=s.note;
  document.getElementById('det').className='det on';
  loadChart(s,p);
}
function closeDet(){document.getElementById('det').className='det';if(detChart){detChart.destroy();detChart=null}}

async function loadChart(s,p){
  if(detChart){detChart.destroy();detChart=null}
  let labels=[],closes=[];
  try{
    const now=new Date();
    const ym=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}01`;
    let r,data;
    if(s.ex==='tse'){
      r=await fetch(`/api/stock?type=tse_day&code=${s.code}&ym=${ym}`);
      if(r.ok){data=await r.json();if(data.stat==='OK'&&data.data?.length){data.data.slice(-20).forEach(row=>{labels.push(row[0]);closes.push(parseFloat(row[6].replace(/,/g,''))||0)});}}
    }
  }catch(e){}
  if(!closes.length&&p){
    const b=p.close;
    for(let i=14;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);if([0,6].includes(d.getDay()))continue;labels.push(`${d.getMonth()+1}/${d.getDate()}`);closes.push(i===0?b:+(b*(0.94+Math.random()*.12)).toFixed(2));}
  }
  if(!closes.length)return;
  if(p&&closes.length)closes[closes.length-1]=p.close;
  const isUp=closes[closes.length-1]>=closes[0];
  const col=isUp?'#e84040':'#22c97a';
  detChart=new Chart(document.getElementById('det-chart').getContext('2d'),{
    type:'line',
    data:{labels,datasets:[{data:closes,borderColor:col,backgroundColor:col+'15',borderWidth:1.5,tension:.3,fill:true,pointRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y.toFixed(2)} 元`}}},
      scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#4a5e80',font:{size:9},maxTicksLimit:8,maxRotation:40}},
              y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#4a5e80',font:{size:9}}}}}
  });
}

buildTabs(); applyFilt(); loadAll();
</script>
